<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails du Projet | Mon Portfolio Statique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="font-sans antialiased bg-slate-100 text-slate-900 dark:bg-slate-950 dark:text-slate-100">

    <!-- Navbar -->
    <header class="sticky top-0 z-40 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="text-xl font-bold font-mono text-blue-600 dark:text-blue-400">gabriel@nicollet:~$</a>
            <div class="flex items-center space-x-4 md:space-x-6">
                <nav class="hidden md:flex space-x-6 text-sm font-medium text-slate-600 dark:text-slate-300">
                    <a href="index.html" class="hover:text-blue-600 dark:hover:text-blue-400 transition">Accueil</a>
                    <a href="projets.html" class="text-blue-600 dark:text-blue-400 font-semibold">Projets</a>
                    <a href="index.html#a-propos" class="hover:text-blue-600 dark:hover:text-blue-400 transition">À propos</a>
                    <a href="contact.html" class="hover:text-blue-600 dark:hover:text-blue-400 transition">Contact</a>
                </nav>
                <button id="theme-toggle" class="p-2 rounded-lg bg-slate-200 dark:bg-slate-800 transition"><span class="block dark:hidden">🌙</span><span class="hidden dark:block">☀️</span></button>
                <button id="mobile-menu-btn" class="p-2 rounded-lg text-slate-600 dark:text-slate-300 md:hidden transition">
                    <svg id="menu-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
            </div>
        </div>
        <div id="mobile-menu" style="max-height: 0px;" class="md:hidden overflow-hidden opacity-0 pointer-events-none border-b border-slate-200 dark:border-slate-800 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md">
            <nav class="flex flex-col p-4 space-y-4 text-base font-medium text-slate-600 dark:text-slate-300">
                <a href="index.html" class="hover:text-blue-600 dark:hover:text-blue-400 transition py-1">Accueil</a>
                <a href="projets.html" class="hover:text-blue-600 dark:hover:text-blue-400 transition py-1">Projets</a>
                <a href="index.html#a-propos" class="hover:text-blue-600 dark:hover:text-blue-400 transition py-1">À propos</a>
                <a href="contact.html" class="hover:text-blue-600 dark:hover:text-blue-400 transition py-1">Contact</a>
            </nav>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-12">
        <a href="projets.html" class="text-sm font-semibold text-blue-600 dark:text-blue-400 hover:underline inline-flex items-center mb-6">← Retour aux projets</a>
        <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white mb-4">Mon Portfolio Site Statique</h1>
    </main>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                const isDark = document.documentElement.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            });
        }
        const menuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');
        if (menuBtn && mobileMenu) {
            mobileMenu.style.transition = 'max-height 0.3s ease-in-out, opacity 0.25s ease-in-out';
            let isMenuOpen = false;
            menuBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (!isMenuOpen) {
                    mobileMenu.style.maxHeight = mobileMenu.scrollHeight + 'px';
                    mobileMenu.classList.remove('opacity-0', 'pointer-events-none');
                    mobileMenu.classList.add('opacity-100');
                    if (menuIcon) menuIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>';
                    isMenuOpen = true;
                } else {
                    mobileMenu.style.maxHeight = '0px';
                    mobileMenu.classList.remove('opacity-100');
                    mobileMenu.classList.add('opacity-0', 'pointer-events-none');
                    if (menuIcon) menuIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>';
                    isMenuOpen = false;
                }
            });
        }
    </script>
</body>
</html>
